services:
  app:
    image: node:22
    container_name: apop-hrms-app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      # Overrides .env (which points at localhost:5433 for host-side tools);
      # inside the compose network the db is reachable at db:5432.
      DATABASE_URL: postgresql://hrms:hrms@db:5432/hrms
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Linux-native node_modules, kept separate from any host install
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    container_name: apop-hrms-db
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
      POSTGRES_DB: hrms
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms -d hrms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
  app_node_modules:
